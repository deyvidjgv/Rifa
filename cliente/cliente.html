<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0" />
    <title>Elegir Número — Sistema de Rifas</title>
    <meta
      name="description"
      content="Selecciona tu número de la suerte del 1 al 1000." />
    <link
      rel="stylesheet"
      href="cliente.css" />
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com" />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  </head>

  <body>
    <header>
      <h1>
        <i class="fas fa-gem"></i>
        Elige tu Número Ganador
      </h1>
      <p>
        <i class="fas fa-rocket"></i>
        Selecciona un número del 1 al 1000 y prepárate para ganar
      </p>
    </header>

    <section class="buscador">
      <input
        type="number"
        id="buscarNumero"
        placeholder="Buscar número..."
        min="1"
        max="1000" />
      <button id="btnBuscar">⚡ Buscar</button>
    </section>

    <section
      id="numeros"
      class="numeros">
      <!-- Numbers generated by JS -->
    </section>

    <section
      id="paginacion"
      class="paginacion">
      <!-- Pagination buttons -->
    </section>

    <section class="leyenda">
      <span class="leyenda-item">
        <span class="disponible"></span>
        Disponible
      </span>
      <span class="leyenda-item">
        <span class="reservado"></span>
        Reservado
      </span>
      <span class="leyenda-item">
        <span class="pendiente_pago"></span>
        Pend. Pago
      </span>
      <span class="leyenda-item">
        <span class="vendido"></span>
        Vendido
      </span>
      <span class="leyenda-item">
        <span class="cancelado"></span>
        Cancelado
      </span>
    </section>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <!-- Data layer -->
    <script src="../data/firebase-config.js"></script>
    <script src="../services/firestoreService.js"></script>
    <script src="../data/numeros.js"></script>

    <!-- Components -->
    <script src="../components/modal.js"></script>

    <!-- Client -->
    <script src="cliente.js"></script>
  </body>
</html>
